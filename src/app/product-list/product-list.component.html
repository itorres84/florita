<div class="container">
  <h5>Recomendados para ti</h5>
  <div class="productRow row">
    <div class="col-3 card" *ngFor="let product of products; let i = index">
        <img src="{{ product.urlImage }}" alt="...">
        <button class="btn btn-primary btnAddCart" type="button" (click)="addToCart(product)">Agregar a carrito</button>
        {{ product.name }}
        <h5> {{product.Price | currency}} </h5>
    </div>
  </div>
</div><!-- container //  -->
<button data-toggle="modal" data-target="#modal_aside_left" class="btn btn-primary" type="button">  Modal aside left  </button>
<div id="modal_aside_left" class="modal fixed-left fade" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-aside" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Carrito de compras</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <app-shoppingcartmodal></app-shoppingcartmodal>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Seguir comprando</button>
        <button type="button" class="btn btn-primary">Continuar</button>
      </div>
    </div>
  </div> <!-- modal-bialog .// -->
</div> <!-- modal.// -->
